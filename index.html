    function supabaseHeaders(token) {
      const h = { "apikey": SUPABASE_KEY, "Content-Type": "application/json" };
      if (token) h["Authorization"] = `Bearer ${token}`;
      return h;
    }

    async function supabaseAuth(action, email, password) {
      const url = `${SUPABASE_URL}/auth/v1/${action}`;
      const res = await fetch(url, {
        method: "POST",
        headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error_description || data.msg || data.error || "Auth failed");
      return data;
    }

    async function supabaseRPC(fnName, payload, token) {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/${fnName}`, {
        method: "POST",
        headers: supabaseHeaders(token),
        body: JSON.stringify(payload)

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || data.detail || "Request failed");
      return data;
    }

      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
        headers: { ...supabaseHeaders(token), "Prefer": "return=representation" }

              lon = pos.coords.longitude;

        setNodes(Array.isArray(data) ? data : []);
        setLoading(false);
      };

      if (view === "add") {
        return React.createElement(AddNodeScreen, {
          token, mac: initialMac,
          onDone: () => { setView("list"); },
          onCancel: () => setView("list")
        });
      }

      if (view === "detail" && selectedNode) {
        return React.createElement(NodeDetailScreen, {
          node: selectedNode, token,
          onBack: () => { setSelectedNode(null); setView("list"); }
        });
      }

      return React.createElement("div", { style: { maxWidth:420, margin:"0 auto", padding:20, paddingTop:20 } },
        // Header
        React.createElement("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 } },
          React.createElement("div", null,
            React.createElement("h1", { style: { fontSize:22, color:C.dark } }, "\uD83C\uDF31 IrrigValve"),
            React.createElement("p", { style: { fontSize:12, color:C.grey } }, user.email)
          ),
          React.createElement("button", {
            onClick: onLogout,
            style: { padding:"6px 14px", borderRadius:8, border:`1px solid ${C.border}`,
              background:C.card, color:C.grey, fontSize:12, cursor:"pointer" }
          }, "Sign out")
        ),

        // Nodes list
        loading
          ? React.createElement("div", { style: { textAlign:"center", padding:40 } }, React.createElement(Spinner))
          : nodes.length === 0
            ? React.createElement(Card, { style: { textAlign:"center", padding:30 } },
                React.createElement("div", { style: { fontSize:36, marginBottom:8 } }, "\uD83C\uDF35"),
                React.createElement("p", { style: { color:C.grey, fontSize:14, marginBottom:16 } },
                  "No valves registered yet."),
                React.createElement(Button, { onClick: () => setView("add") }, "Add Your First Valve")
              )
            : React.createElement(React.Fragment, null,
                nodes.map(n =>
                  React.createElement(NodeCard, {
                    key: n.id, node: n,
                    onClick: () => { setSelectedNode(n); setView("detail"); }
                  })
                ),
                React.createElement(Button, {
                  onClick: () => setView("add"),
                  style: { marginTop:8 }
                }, "+ Add Another Valve")
              )
      );
    }

    // ─── Main App ───────────────────────────────────────────────
    function App() {
      // Parse URL params (mac from NFC/QR)
      const params = new URLSearchParams(window.location.search);
      const urlMac = params.get("mac") || "";

      // Auth state
      const [screen, setScreen] = useState("landing"); // landing | auth | dashboard
      const [token, setToken] = useState(null);
      const [user, setUser] = useState(null);

      // Check for saved session
      useEffect(() => {
        try {
          const saved = localStorage.getItem("irrigvalve_session");
          if (saved) {
            const session = JSON.parse(saved);
            if (session.token && session.user) {
              setToken(session.token);
              setUser(session.user);
              setScreen("dashboard");
            }
          }
        } catch(e) {}
      }, []);

      const handleAuth = (accessToken, userData) => {
        setToken(accessToken);
        setUser(userData);
        setScreen("dashboard");
        try {
          localStorage.setItem("irrigvalve_session", JSON.stringify({ token: accessToken, user: userData }));
        } catch(e) {}
      };

      const handleLogout = () => {
        setToken(null);
        setUser(null);
        setScreen("landing");
        try { localStorage.removeItem("irrigvalve_session"); } catch(e) {}
      };

      const goLocal = () => {
        // Redirect to the ESP32's local PWA
        // Try mDNS first, fall back to asking for IP
        const ip = prompt("Enter your valve's IP address to use local mode:\n\n(Check your router or the valve's display)");
        if (ip) {
          window.location.href = `http://${ip}/app`;
        }
      };

      if (screen === "landing") {
        return React.createElement(LandingScreen, {
          mac: urlMac,
          onCloud: () => setScreen("auth"),
          onLocal: goLocal
        });
      }

      if (screen === "auth") {
        return React.createElement(AuthScreen, {
          mac: urlMac,
          onAuth: handleAuth
        });
      }

      if (screen === "dashboard") {
        return React.createElement(DashboardScreen, {
          token, user,
          initialMac: urlMac || null,
          onLogout: handleLogout
        });
      }
    }

    ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
